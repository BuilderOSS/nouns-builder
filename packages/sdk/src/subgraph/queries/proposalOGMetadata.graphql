query proposalOGMetadata($where: Proposal_filter!, $first: Int!) {
  proposals(where: $where, first: $first) {
    ...ProposalDetail
    votes {
      ...ProposalVote
    }
    dao {
      name
      contractImage
      tokenAddress
      metadataAddress
      auctionAddress
      treasuryAddress
      governorAddress
    }
  }
}
