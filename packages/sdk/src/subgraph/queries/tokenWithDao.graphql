query tokenWithDao($id: ID!) {
  token(id: $id) {
    ...Token
    auction {
      winningBid {
        amount
        bidder
      }
    }
    dao {
      name
      description
      links {
        id
        key
        url
      }
      contractImage
      totalSupply
      ownerCount
      proposalCount
      tokenAddress
      metadataAddress
      auctionAddress
      treasuryAddress
      governorAddress
    }
  }
}
